{% extends "base.html" %}

{% block title %}Log In | Internal Tool Directory{% endblock %}

{% block content %}
  <h1>Log In</h1>
  <form method="post">
    {{ form.hidden_tag() }}
    <div>
      {{ form.username.label }}
      {{ form.username() }}
    </div>
    <div>
      {{ form.password.label }}
      {{ form.password() }}
    </div>
    <div>
      {{ form.submit() }}
    </div>
  </form>
{% endblock %}
